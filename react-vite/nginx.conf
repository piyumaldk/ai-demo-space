worker_processes auto;
pid /app/.tmp/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_body_temp_path /app/.tmp/nginx/cache/client_temp;
    proxy_temp_path       /app/.tmp/nginx/cache/proxy_temp;
    fastcgi_temp_path     /app/.tmp/nginx/cache/fastcgi_temp;
    uwsgi_temp_path       /app/.tmp/nginx/cache/uwsgi_temp;
    scgi_temp_path        /app/.tmp/nginx/cache/scgi_temp;

    sendfile on;
    keepalive_timeout 65;
    gzip on;

    server {
        listen 8080;
        root /app;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
